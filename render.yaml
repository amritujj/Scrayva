services:
  - type: web
    name: scrayva-worker
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt && python -m playwright install --with-deps chromium chromium-headless-shell
    startCommand: uvicorn worker:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: ALLOWED_ORIGINS
        sync: false
